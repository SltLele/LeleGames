<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 24px 20px 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a44;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title {
            font-size: 26px;
            font-weight: 800;
            color: #4caf50;
        }
        .info {
            display: flex;
            gap: 16px;
            color: #ccc;
            font-weight: 600;
            font-size: 16px;
        }
        .info span {
            background: #252540;
            padding: 4px 14px;
            border-radius: 30px;
        }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            background: #111122;
            border-radius: 16px;
            border: 2px solid #2a2a44;
            margin-bottom: 12px;
            touch-action: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            background: #252540;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1 1 auto;
            min-width: 70px;
        }
        .btn:hover {
            background: #33335a;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #f7971e;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #ffa82e;
        }
        .dir-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 220px;
            margin: 10px auto 0;
        }
        .dir-btns .btn {
            padding: 12px 0;
            font-size: 22px;
            min-width: 0;
        }
        .dir-btns .btn:empty {
            background: transparent;
            cursor: default;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 13px;
            border-top: 1px solid #2a2a44;
            padding-top: 14px;
        }
        @media (max-width: 480px) {
            .title {
                font-size: 20px;
            }
            .dir-btns .btn {
                font-size: 18px;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">🐍 贪吃蛇</div>
            <div class="info">
                <span>🍎 <span id="score">0</span></span>
            </div>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn btn-primary" id="btnReset">🔄 重开</button>
            <button class="btn" id="btnToggle">⏸️ 暂停</button>
        </div>
        <div class="dir-btns">
            <div></div><button class="btn" id="dirUp">⬆</button><div></div>
            <button class="btn" id="dirLeft">⬅</button>
            <button class="btn" id="dirDown">⬇</button>
            <button class="btn" id="dirRight">➡</button>
        </div>
        <div class="footer">⌨️ 方向键移动 · Space暂停/继续 · R重开</div>
    </div>
    <script>
        (function() {
            const SIZE = 20;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');

            let snake = [];
            let food = {};
            let direction = 'right';
            let nextDirection = 'right';
            let score = 0;
            let gameOver = false;
            let paused = false;
            let intervalId = null;
            const speed = 150;
            let animFrame = 0;

            function initGame() {
                snake = [
                    [10, 10],
                    [9, 10],
                    [8, 10]
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                gameOver = false;
                paused = false;
                document.getElementById('btnToggle').textContent = '⏸️ 暂停';
                generateFood();
                if (intervalId) { clearInterval(intervalId);
                    intervalId = null; }
                startLoop();
                draw();
            }

            function generateFood() {
                let pos;
                do {
                    pos = [Math.floor(Math.random() * SIZE), Math.floor(Math.random() * SIZE)];
                } while (snake.some(seg => seg[0] === pos[0] && seg[1] === pos[1]));
                food = { x: pos[0], y: pos[1] };
            }

            function startLoop() {
                if (intervalId) clearInterval(intervalId);
                intervalId = setInterval(() => {
                    if (paused || gameOver) return;
                    update();
                    draw();
                }, speed);
            }

            function update() {
                direction = nextDirection;
                const head = snake[0];
                let newHead = [...head];
                switch (direction) {
                    case 'right':
                        newHead[0]++;
                        break;
                    case 'left':
                        newHead[0]--;
                        break;
                    case 'up':
                        newHead[1]--;
                        break;
                    case 'down':
                        newHead[1]++;
                        break;
                }
                if (newHead[0] < 0 || newHead[0] >= SIZE || newHead[1] < 0 || newHead[1] >= SIZE) {
                    endGame();
                    return;
                }
                if (snake.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
                    endGame();
                    return;
                }
                snake.unshift(newHead);
                if (newHead[0] === food.x && newHead[1] === food.y) {
                    score++;
                    scoreEl.textContent = score;
                    generateFood();
                } else {
                    snake.pop();
                }
            }

            function draw() {
                const cellSize = 400 / SIZE;
                ctx.clearRect(0, 0, 400, 400);
                // Grid
                ctx.strokeStyle = '#1a1a3a';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0);
                    ctx.lineTo(i * cellSize, 400);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize);
                    ctx.lineTo(400, i * cellSize);
                    ctx.stroke();
                }
                // Snake
                snake.forEach((seg, idx) => {
                    const x = seg[0] * cellSize,
                        y = seg[1] * cellSize;
                    const gradient = ctx.createRadialGradient(x + cellSize / 2, y + cellSize / 2, 2, x + cellSize / 2,
                        y + cellSize / 2, cellSize);
                    gradient.addColorStop(0, idx === 0 ? '#81c784' : '#4caf50');
                    gradient.addColorStop(1, idx === 0 ? '#2e7d32' : '#1b5e20');
                    ctx.fillStyle = gradient;
                    ctx.shadowColor = '#4caf50';
                    ctx.shadowBlur = idx === 0 ? 20 : 10;
                    ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                    ctx.shadowBlur = 0;
                });
                // Food pulse
                const pulse = Math.sin(Date.now() / 200) * 0.15 + 1;
                const fx = food.x * cellSize + cellSize / 2;
                const fy = food.y * cellSize + cellSize / 2;
                const radius = (cellSize / 2 - 2) * pulse;
                ctx.shadowColor = '#ff5252';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ff5252';
                ctx.beginPath();
                ctx.arc(fx, fy, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function endGame() {
                gameOver = true;
                if (intervalId) { clearInterval(intervalId);
                    intervalId = null; }
                setTimeout(() => alert('💀 游戏结束！得分：' + score), 100);
            }

            function changeDirection(newDir) {
                const opposite = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (newDir !== opposite[direction]) {
                    nextDirection = newDir;
                }
            }

            document.getElementById('btnReset').addEventListener('click', initGame);
            document.getElementById('btnToggle').addEventListener('click', () => {
                if (gameOver) return;
                paused = !paused;
                document.getElementById('btnToggle').textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
            });
            document.getElementById('dirUp').addEventListener('click', () => changeDirection('up'));
            document.getElementById('dirDown').addEventListener('click', () => changeDirection('down'));
            document.getElementById('dirLeft').addEventListener('click', () => changeDirection('left'));
            document.getElementById('dirRight').addEventListener('click', () => changeDirection('right'));

            document.addEventListener('keydown', e => {
                const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
                if (map[e.key]) { e.preventDefault();
                    changeDirection(map[e.key]); }
                if (e.key === ' ' || e.key === 'Space') { e.preventDefault();
                    document.getElementById('btnToggle').click(); }
                if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                    initGame(); }
            });

            let startX, startY;
            canvas.addEventListener('touchstart', e => {
                const t = e.touches[0];
                startX = t.clientX;
                startY = t.clientY;
            }, { passive: true });
            canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
            canvas.addEventListener('touchend', e => {
                if (startX === undefined) return;
                const t = e.changedTouches[0];
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
                if (Math.abs(dx) > Math.abs(dy)) {
                    changeDirection(dx > 0 ? 'right' : 'left');
                } else {
                    changeDirection(dy > 0 ? 'down' : 'up');
                }
                startX = startY = undefined;
            }, { passive: true });

            initGame();
        })();
    </script>
</body>
</html>
