<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆翻牌</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 24px 20px 20px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a44;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title {
            font-size: 26px;
            font-weight: 800;
            color: #ffd200;
        }
        .info {
            display: flex;
            gap: 16px;
            color: #ccc;
            font-weight: 600;
            font-size: 16px;
        }
        .info span {
            background: #252540;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #111122;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid #2a2a44;
            margin-bottom: 12px;
            perspective: 800px;
            touch-action: none;
        }
        .card {
            aspect-ratio: 1/1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
            border-radius: 10px;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card.matched {
            animation: matchBounce 0.5s ease;
        }
        @keyframes matchBounce {
            0% {
                transform: rotateY(180deg) scale(1);
            }
            50% {
                transform: rotateY(180deg) scale(1.15);
                filter: drop-shadow(0 0 20px #4caf50);
            }
            100% {
                transform: rotateY(180deg) scale(1);
            }
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            border: 2px solid #3a3a66;
        }
        .card-back {
            background: #2d2d5a;
            transform: rotateY(0deg);
            color: #fff;
            font-size: 28px;
        }
        .card-front {
            background: #1a1a3e;
            transform: rotateY(180deg);
            border-color: #f7971e;
        }
        .card.matched .card-front {
            border-color: #4caf50;
            background: #1a3a2a;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            background: #252540;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1 1 auto;
            min-width: 80px;
        }
        .btn:hover {
            background: #33335a;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #f7971e;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #ffa82e;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 13px;
            border-top: 1px solid #2a2a44;
            padding-top: 14px;
        }
        @media (max-width: 480px) {
            .card-face {
                font-size: 22px;
            }
            .grid {
                gap: 6px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">🧠 记忆翻牌</div>
            <div class="info">
                <span>🎯 <span id="pairs">0</span>/8</span>
                <span>👆 <span id="moves">0</span></span>
            </div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <button class="btn btn-primary" id="btnReset">🔄 重开</button>
        </div>
        <div class="footer">⌨️ 键盘：R 重新开始</div>
    </div>
    <script>
        (function() {
            const EMOJIS = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            let cards = [];
            let flipped = [];
            let matched = [];
            let moves = 0;
            let lock = false;
            let firstIndex = null;
            let timeoutId = null;
            const gridEl = document.getElementById('grid');
            const pairsEl = document.getElementById('pairs');
            const movesEl = document.getElementById('moves');

            function initGame() {
                const deck = [...EMOJIS, ...EMOJIS];
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                cards = deck;
                flipped = Array(deck.length).fill(false);
                matched = Array(deck.length).fill(false);
                moves = 0;
                lock = false;
                firstIndex = null;
                if (timeoutId) { clearTimeout(timeoutId);
                    timeoutId = null; }
                render();
            }

            function render() {
                gridEl.innerHTML = '';
                let matchedCount = 0;
                for (let i = 0; i < cards.length; i++) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    if (matched[i]) {
                        card.classList.add('matched', 'flipped');
                        matchedCount++;
                    } else if (flipped[i]) {
                        card.classList.add('flipped');
                    }
                    card.dataset.index = i;

                    const back = document.createElement('div');
                    back.className = 'card-face card-back';
                    back.textContent = '❓';
                    const front = document.createElement('div');
                    front.className = 'card-face card-front';
                    front.textContent = cards[i];

                    card.appendChild(back);
                    card.appendChild(front);
                    gridEl.appendChild(card);
                }
                pairsEl.textContent = matchedCount / 2;
                movesEl.textContent = moves;
                if (matchedCount === cards.length) {
                    setTimeout(() => alert('🎉 恭喜你完成所有配对！'), 200);
                }
            }

            function handleCardClick(index) {
                if (lock) return;
                if (matched[index]) return;
                if (flipped[index]) return;
                if (firstIndex === null) {
                    flipped[index] = true;
                    firstIndex = index;
                    render();
                    return;
                }
                if (firstIndex === index) return;
                flipped[index] = true;
                moves++;
                render();
                lock = true;
                const idx1 = firstIndex,
                    idx2 = index;
                if (cards[idx1] === cards[idx2]) {
                    matched[idx1] = true;
                    matched[idx2] = true;
                    flipped[idx1] = false;
                    flipped[idx2] = false;
                    firstIndex = null;
                    lock = false;
                    render();
                } else {
                    timeoutId = setTimeout(() => {
                        flipped[idx1] = false;
                        flipped[idx2] = false;
                        firstIndex = null;
                        lock = false;
                        render();
                        timeoutId = null;
                    }, 700);
                }
            }

            gridEl.addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (!card) return;
                const index = parseInt(card.dataset.index);
                handleCardClick(index);
            });
            gridEl.addEventListener('touchstart', e => {
                const card = e.target.closest('.card');
                if (!card) return;
                const index = parseInt(card.dataset.index);
                handleCardClick(index);
            }, { passive: true });

            document.addEventListener('keydown', e => {
                if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                    initGame(); }
            });

            document.getElementById('btnReset').addEventListener('click', initGame);
            initGame();
        })();
    </script>
</body>
</html>
