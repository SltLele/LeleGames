<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 24px 20px 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a44;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-box {
            background: #252540;
            padding: 6px 18px;
            border-radius: 30px;
            color: #ffd200;
            font-weight: 700;
            font-size: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #111122;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid #2a2a44;
            margin-bottom: 12px;
            touch-action: none;
        }
        .cell {
            aspect-ratio: 1/1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 28px;
            transition: background 0.1s, transform 0.1s;
            background: #252540;
            color: #fff;
        }
        .cell.pop {
            animation: pop 0.2s ease;
        }
        @keyframes pop {
            0% {
                transform: scale(0.3);
                opacity: 0.6;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .cell[data-v="2"] {
            background: #eee4da;
            color: #776e65;
        }
        .cell[data-v="4"] {
            background: #ede0c8;
            color: #776e65;
        }
        .cell[data-v="8"] {
            background: #f2b179;
            color: #f9f6f2;
        }
        .cell[data-v="16"] {
            background: #f59563;
            color: #f9f6f2;
        }
        .cell[data-v="32"] {
            background: #f67c5f;
            color: #f9f6f2;
        }
        .cell[data-v="64"] {
            background: #f65e3b;
            color: #f9f6f2;
        }
        .cell[data-v="128"] {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 22px;
        }
        .cell[data-v="256"] {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 22px;
        }
        .cell[data-v="512"] {
            background: #edc850;
            color: #f9f6f2;
            font-size: 22px;
        }
        .cell[data-v="1024"] {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 18px;
        }
        .cell[data-v="2048"] {
            background: #edc22e;
            color: #f9f6f2;
            font-size: 18px;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            background: #252540;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1 1 auto;
            min-width: 80px;
        }
        .btn:hover {
            background: #33335a;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #f7971e;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #ffa82e;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 13px;
            border-top: 1px solid #2a2a44;
            padding-top: 14px;
            letter-spacing: 0.3px;
        }
        @media (max-width: 480px) {
            .cell {
                font-size: 20px;
            }
            .grid {
                gap: 6px;
                padding: 8px;
            }
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-box">🏆 <span id="score">0</span></div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <button class="btn" id="btnUp">⬆ 上</button>
            <button class="btn" id="btnDown">⬇ 下</button>
            <button class="btn" id="btnLeft">⬅ 左</button>
            <button class="btn" id="btnRight">➡ 右</button>
            <button class="btn btn-primary" id="btnReset">🔄 重开</button>
        </div>
        <div class="footer">⌨️ 键盘：方向键(↑↓←→)移动 · R 重新开始</div>
    </div>
    <script>
        (function() {
            const SIZE = 4;
            let grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            let score = 0;
            let gameOver = false;
            const gridEl = document.getElementById('grid');
            const scoreEl = document.getElementById('score');

            function initGrid() {
                grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
                score = 0;
                gameOver = false;
                addRandomTile();
                addRandomTile();
                render();
            }

            function addRandomTile() {
                const empty = [];
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === 0) empty.push({ r, c });
                    }
                }
                if (empty.length === 0) return;
                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }

            function render() {
                gridEl.innerHTML = '';
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const val = grid[r][c];
                        cell.dataset.v = val;
                        cell.textContent = val || '';
                        if (val !== 0) cell.classList.add('pop');
                        gridEl.appendChild(cell);
                    }
                }
                scoreEl.textContent = score;
            }

            function slide(row) {
                let arr = row.filter(v => v !== 0);
                let merged = [];
                let newScore = 0;
                for (let i = 0; i < arr.length; i++) {
                    if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                        merged.push(arr[i] * 2);
                        newScore += arr[i] * 2;
                        i++;
                    } else {
                        merged.push(arr[i]);
                    }
                }
                while (merged.length < SIZE) merged.push(0);
                return { row: merged, score: newScore };
            }

            function move(direction) {
                if (gameOver) return;
                let moved = false;
                let totalScore = 0;
                const newGrid = grid.map(row => [...row]);

                if (direction === 'left') {
                    for (let r = 0; r < SIZE; r++) {
                        const result = slide(newGrid[r]);
                        newGrid[r] = result.row;
                        totalScore += result.score;
                    }
                } else if (direction === 'right') {
                    for (let r = 0; r < SIZE; r++) {
                        const reversed = [...newGrid[r]].reverse();
                        const result = slide(reversed);
                        newGrid[r] = result.row.reverse();
                        totalScore += result.score;
                    }
                } else if (direction === 'up') {
                    for (let c = 0; c < SIZE; c++) {
                        const col = [];
                        for (let r = 0; r < SIZE; r++) col.push(newGrid[r][c]);
                        const result = slide(col);
                        for (let r = 0; r < SIZE; r++) newGrid[r][c] = result.row[r];
                        totalScore += result.score;
                    }
                } else if (direction === 'down') {
                    for (let c = 0; c < SIZE; c++) {
                        const col = [];
                        for (let r = 0; r < SIZE; r++) col.push(newGrid[r][c]);
                        const reversed = col.reverse();
                        const result = slide(reversed);
                        const final = result.row.reverse();
                        for (let r = 0; r < SIZE; r++) newGrid[r][c] = final[r];
                        totalScore += result.score;
                    }
                }

                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] !== newGrid[r][c]) moved = true;
                    }
                }
                if (!moved) return;
                grid = newGrid;
                score += totalScore;
                addRandomTile();
                render();
                if (isGameOver()) {
                    gameOver = true;
                    setTimeout(() => alert('游戏结束！得分：' + score), 100);
                }
            }

            function isGameOver() {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === 0) return false;
                        if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                        if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                    }
                }
                return true;
            }

            document.getElementById('btnUp').addEventListener('click', () => move('up'));
            document.getElementById('btnDown').addEventListener('click', () => move('down'));
            document.getElementById('btnLeft').addEventListener('click', () => move('left'));
            document.getElementById('btnRight').addEventListener('click', () => move('right'));
            document.getElementById('btnReset').addEventListener('click', initGrid);

            document.addEventListener('keydown', e => {
                const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
                if (map[e.key]) { e.preventDefault();
                    move(map[e.key]); }
                if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                    initGrid(); }
            });

            let startX, startY;
            gridEl.addEventListener('touchstart', e => {
                const t = e.touches[0];
                startX = t.clientX;
                startY = t.clientY;
            }, { passive: true });
            gridEl.addEventListener('touchend', e => {
                if (startX === undefined) return;
                const t = e.changedTouches[0];
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
                if (Math.abs(dx) > Math.abs(dy)) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
                startX = startY = undefined;
            }, { passive: true });

            initGrid();
        })();
    </script>
</body>
</html>
