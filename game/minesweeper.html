<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a44;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title {
            font-size: 26px;
            font-weight: 800;
            color: #ffd200;
        }
        .info {
            display: flex;
            gap: 16px;
            color: #ccc;
            font-weight: 600;
            font-size: 16px;
        }
        .info span {
            background: #252540;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            background: #111122;
            padding: 8px;
            border-radius: 14px;
            border: 2px solid #2a2a44;
            margin-bottom: 12px;
            position: relative;
            touch-action: none;
        }
        .cell {
            aspect-ratio: 1/1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            background: #2a2a50;
            border: 2px solid #3a3a66;
            cursor: pointer;
            transition: 0.12s;
            color: #fff;
        }
        .cell.revealed {
            background: #1a1a3a;
            border-color: #2a2a4a;
            cursor: default;
            transform: scale(0.96);
        }
        .cell.flagged {
            background: #3a2a2a;
            border-color: #cc4444;
            animation: flagPop 0.2s ease;
        }
        @keyframes flagPop {
            0% {
                transform: scale(0.5);
            }
            100% {
                transform: scale(1);
            }
        }
        .cell.mine-explode {
            background: #cc2222;
            border-color: #ff4444;
            animation: explode 0.3s ease;
        }
        @keyframes explode {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4) rotate(10deg);
            }
        }
        .cell.highlight {
            border-color: #ffd200;
            box-shadow: 0 0 12px rgba(255, 210, 0, 0.6);
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            background: #252540;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1 1 auto;
            min-width: 80px;
        }
        .btn:hover {
            background: #33335a;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #f7971e;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #ffa82e;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 13px;
            border-top: 1px solid #2a2a44;
            padding-top: 14px;
            letter-spacing: 0.3px;
        }
        @media (max-width: 480px) {
            .cell {
                font-size: 13px;
            }
            .grid {
                gap: 3px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">💣 扫雷</div>
            <div class="info">
                <span>💣 <span id="mineCount">10</span></span>
                <span>🚩 <span id="flagCount">0</span></span>
            </div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <button class="btn btn-primary" id="btnReset">🔄 重开</button>
        </div>
        <div class="footer">⌨️ 方向键移动高亮 · Space/Enter翻开 · F标记 · R重开</div>
    </div>
    <script>
        (function() {
            const ROWS = 9,
                COLS = 9,
                MINES = 10;
            let board = [];
            let revealed = [];
            let flagged = [];
            let gameOver = false;
            let firstClick = true;
            let highlightR = 0,
                highlightC = 0;
            const gridEl = document.getElementById('grid');
            const mineCountEl = document.getElementById('mineCount');
            const flagCountEl = document.getElementById('flagCount');

            function initBoard() {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                revealed = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                flagged = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                gameOver = false;
                firstClick = true;
                highlightR = 0;
                highlightC = 0;
                mineCountEl.textContent = MINES;
                flagCountEl.textContent = 0;
                render();
            }

            function placeMines(excludeR, excludeC) {
                let placed = 0;
                while (placed < MINES) {
                    const r = Math.floor(Math.random() * ROWS);
                    const c = Math.floor(Math.random() * COLS);
                    if (board[r][c] === -1) continue;
                    if (r === excludeR && c === excludeC) continue;
                    board[r][c] = -1;
                    placed++;
                }
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === -1) continue;
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr,
                                    nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
                            }
                        }
                        board[r][c] = count;
                    }
                }
            }

            function render() {
                gridEl.innerHTML = '';
                let flagTotal = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === highlightR && c === highlightC && !gameOver) cell.classList.add('highlight');
                        if (revealed[r][c]) {
                            cell.classList.add('revealed');
                            if (board[r][c] === -1) {
                                cell.textContent = '💣';
                                cell.classList.add('mine-explode');
                            } else if (board[r][c] > 0) {
                                cell.textContent = board[r][c];
                                cell.style.color = ['', '#4a9eff', '#4caf50', '#ff6b6b', '#1a237e', '#8d6e63', '#00bcd4',
                                    '#212121', '#78909c'
                                ][board[r][c]] || '#fff';
                            }
                        } else if (flagged[r][c]) {
                            cell.classList.add('flagged');
                            cell.textContent = '🚩';
                            flagTotal++;
                        }
                        cell.dataset.r = r;
                        cell.dataset.c = c;
                        gridEl.appendChild(cell);
                    }
                }
                flagCountEl.textContent = flagTotal;
                mineCountEl.textContent = MINES - flagTotal;
            }

            function revealCell(r, c) {
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
                if (revealed[r][c] || flagged[r][c]) return;
                if (board[r][c] === -1) {
                    gameOver = true;
                    for (let rr = 0; rr < ROWS; rr++)
                        for (let cc = 0; cc < COLS; cc++) {
                            if (board[rr][cc] === -1) revealed[rr][cc] = true;
                        }
                    render();
                    setTimeout(() => alert('💥 踩雷了！'), 100);
                    return;
                }
                revealed[r][c] = true;
                if (board[r][c] === 0) {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            revealCell(r + dr, c + dc);
                        }
                    }
                }
                render();
                checkWin();
            }

            function toggleFlag(r, c) {
                if (revealed[r][c] || gameOver) return;
                flagged[r][c] = !flagged[r][c];
                render();
            }

            function checkWin() {
                let totalRevealed = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (revealed[r][c]) totalRevealed++;
                    }
                }
                if (totalRevealed === ROWS * COLS - MINES && !gameOver) {
                    gameOver = true;
                    setTimeout(() => alert('🎉 你赢了！'), 100);
                }
            }

            function handleClick(r, c) {
                if (gameOver) return;
                if (flagged[r][c]) return;
                if (firstClick) {
                    placeMines(r, c);
                    firstClick = false;
                }
                revealCell(r, c);
            }

            // Mouse / Touch events
            gridEl.addEventListener('click', e => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r),
                    c = parseInt(cell.dataset.c);
                handleClick(r, c);
            });
            gridEl.addEventListener('contextmenu', e => {
                e.preventDefault();
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r),
                    c = parseInt(cell.dataset.c);
                if (gameOver || revealed[r][c]) return;
                toggleFlag(r, c);
            });

            let longPressTimer = null;
            gridEl.addEventListener('touchstart', e => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r),
                    c = parseInt(cell.dataset.c);
                longPressTimer = setTimeout(() => {
                    if (!gameOver && !revealed[r][c]) toggleFlag(r, c);
                    longPressTimer = null;
                }, 500);
            }, { passive: true });
            gridEl.addEventListener('touchend', e => {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                    const cell = e.target.closest('.cell');
                    if (!cell) return;
                    const r = parseInt(cell.dataset.r),
                        c = parseInt(cell.dataset.c);
                    if (!gameOver && !flagged[r][c] && !revealed[r][c]) handleClick(r, c);
                }
            }, { passive: true });
            gridEl.addEventListener('touchmove', () => { if (longPressTimer) { clearTimeout(longPressTimer);
                    longPressTimer = null; } }, { passive: true });

            // Keyboard controls
            document.addEventListener('keydown', e => {
                if (gameOver) {
                    if (e.key === 'r' || e.key === 'R') initBoard();
                    return;
                }
                const step = 1;
                let moved = false;
                if (e.key === 'ArrowUp') { highlightR = Math.max(0, highlightR - step);
                    moved = true; }
                if (e.key === 'ArrowDown') { highlightR = Math.min(ROWS - 1, highlightR + step);
                    moved = true; }
                if (e.key === 'ArrowLeft') { highlightC = Math.max(0, highlightC - step);
                    moved = true; }
                if (e.key === 'ArrowRight') { highlightC = Math.min(COLS - 1, highlightC + step);
                    moved = true; }
                if (moved) { e.preventDefault();
                    render(); return; }

                if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
                    e.preventDefault();
                    handleClick(highlightR, highlightC);
                }
                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    if (!revealed[highlightR][highlightC]) toggleFlag(highlightR, highlightC);
                }
                if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                    initBoard(); }
            });

            document.getElementById('btnReset').addEventListener('click', initBoard);
            initBoard();
        })();
    </script>
</body>
</html>
