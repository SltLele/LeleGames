<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打靶 · 射气球</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a18;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app {
            background: #16162e;
            border-radius: 28px;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a50;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            color: #feca57;
            text-shadow: 0 0 20px #feca5766;
        }
        .info {
            display: flex;
            gap: 16px;
            color: #ccc;
            font-weight: 600;
            font-size: 18px;
        }
        .info span {
            background: #25254a;
            padding: 4px 14px;
            border-radius: 30px;
        }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 3/4;
            background: #0f0f22;
            border-radius: 16px;
            border: 2px solid #2a2a50;
            margin-bottom: 12px;
            touch-action: none;
            cursor: crosshair;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            background: #25254a;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1 1 auto;
            min-width: 70px;
        }
        .btn:hover {
            background: #35356a;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #feca57;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #ffd97a;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #2a2a50;
            padding-top: 14px;
        }
        @media (max-width: 480px) {
            .title {
                font-size: 22px;
            }
            .info {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">🎈 射气球</div>
            <div class="info">
                <span>🎯 <span id="score">0</span></span>
                <span>🔥 <span id="combo">0</span></span>
            </div>
        </div>
        <canvas id="canvas" width="360" height="480"></canvas>
        <div class="controls">
            <button class="btn btn-primary" id="btnReset">🔄 重开</button>
            <button class="btn" id="btnShoot">🔫 射击</button>
        </div>
        <div class="footer">⌨️ ←/→ 移动准星 · Space 射击 · R 重开</div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');
            const comboEl = document.getElementById('combo');

            const W = 360,
                H = 480;
            canvas.width = W;
            canvas.height = H;

            let balloons = [];
            let particles = [];
            let score = 0;
            let combo = 0;
            let maxCombo = 0;
            let gameOver = false;
            let spawnTimer = 0;
            let spawnInterval = 40;
            let cursorX = W / 2;
            let cursorY = H - 60;

            // 浮动物体
            class Balloon {
                constructor() {
                    this.radius = 18 + Math.random() * 14;
                    this.x = Math.random() * (W - this.radius * 2) + this.radius;
                    this.y = H + this.radius;
                    this.speed = 0.8 + Math.random() * 1.2;
                    this.color = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3', '#5f27cd', '#ff9f43'][Math.floor(
                        Math.random() * 7)];
                    this.wobble = Math.random() * 10;
                    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
                    this.alive = true;
                    this.points = Math.floor(this.radius / 6) + 1;
                }

                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.4;
                    if (this.y + this.radius < 0) {
                        this.alive = false;
                        // 漏掉气球扣连击
                        combo = 0;
                        updateUI();
                    }
                }

                draw() {
                    // 绳子
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.radius);
                    ctx.lineTo(this.x, this.y + this.radius + 18);
                    ctx.stroke();

                    // 气球主体
                    const grad = ctx.createRadialGradient(this.x - 4, this.y - 6, 2, this.x, this.y, this.radius);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.3, this.color);
                    grad.addColorStop(1, this.color);
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // 高光
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.ellipse(this.x - 4, this.y - 6, 5, 3, 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    // 底部小结
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(this.x - 4, this.y + this.radius);
                    ctx.lineTo(this.x + 4, this.y + this.radius);
                    ctx.lineTo(this.x, this.y + this.radius + 4);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                }

                contains(px, py) {
                    const dx = px - this.x,
                        dy = py - this.y;
                    return dx * dx + dy * dy < this.radius * this.radius;
                }
            }

            function spawnBalloon() {
                if (balloons.length < 25) {
                    balloons.push(new Balloon());
                }
            }

            function shoot(x, y) {
                if (gameOver) return;
                let hit = false;
                for (let i = balloons.length - 1; i >= 0; i--) {
                    const b = balloons[i];
                    if (b.contains(x, y)) {
                        hit = true;
                        b.alive = false;
                        combo++;
                        if (combo > maxCombo) maxCombo = combo;
                        const bonus = Math.min(combo, 15);
                        const addScore = b.points * bonus;
                        score += addScore;
                        spawnParticles(b.x, b.y, b.color, 25);
                        // 飘字
                        spawnFloatingText(b.x, b.y - 10, `+${addScore}`, '#fff');
                        balloons.splice(i, 1);
                        updateUI();
                        break;
                    }
                }
                if (!hit) {
                    combo = 0;
                    updateUI();
                    spawnParticles(x, y, '#ff6b6b', 6);
                }
            }

            let floatingTexts = [];

            function spawnFloatingText(x, y, text, color) {
                floatingTexts.push({ x, y, text, color, life: 1, dy: -2 });
            }

            function spawnParticles(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 1;
                    particles.push({
                        x,
                        y,
                        dx: Math.cos(angle) * speed,
                        dy: Math.sin(angle) * speed - 1,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        radius: Math.random() * 5 + 2,
                        color: color
                    });
                }
            }

            function updateUI() {
                scoreEl.textContent = score;
                comboEl.textContent = combo;
            }

            function update() {
                if (gameOver) return;

                // 生成
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnBalloon();
                    if (spawnInterval > 15) spawnInterval -= 0.05;
                }

                // 更新气球
                for (let i = balloons.length - 1; i >= 0; i--) {
                    balloons[i].update();
                    if (!balloons[i].alive) {
                        balloons.splice(i, 1);
                    }
                }

                // 更新粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.dx;
                    p.y += p.dy;
                    p.dy += 0.08;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // 更新飘字
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.dy;
                    ft.life -= 0.02;
                    if (ft.life <= 0) floatingTexts.splice(i, 1);
                }

                // 检查失败条件（气球太多或分数为负，这里只做简单限制）
                if (balloons.length > 30) {
                    gameOver = true;
                    setTimeout(() => alert('💥 气球太多了！点击重开'), 100);
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                // 气球
                for (let b of balloons) b.draw();

                // 粒子
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // 飘字
                for (let ft of floatingTexts) {
                    ctx.globalAlpha = ft.life;
                    ctx.fillStyle = ft.color;
                    ctx.font = 'bold 18px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 10;
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // 准星
                const cx = cursorX,
                    cy = cursorY;
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 18, cy);
                ctx.lineTo(cx + 18, cy);
                ctx.moveTo(cx, cy - 18);
                ctx.lineTo(cx, cy + 18);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,0,0,0.6)';
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.font = 'bold 28px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('游戏结束', W / 2, H / 2);
                }
            }

            // 鼠标/触摸
            function handleMove(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                cursorX = (clientX - rect.left) * scaleX;
                cursorY = (clientY - rect.top) * scaleY;
                cursorX = Math.max(0, Math.min(W, cursorX));
                cursorY = Math.max(0, Math.min(H, cursorY));
            }

            function handleShoot(e) {
                e.preventDefault();
                if (gameOver) return;
                shoot(cursorX, cursorY);
            }

            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('touchmove', handleMove, { passive: true });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleMove(e);
                if (!gameOver) shoot(cursorX, cursorY);
            }, { passive: false });
            canvas.addEventListener('click', () => {
                if (!gameOver) shoot(cursorX, cursorY);
            });

            document.getElementById('btnShoot').addEventListener('click', () => {
                if (gameOver) { resetGame(); return; }
                shoot(cursorX, cursorY);
            });
            document.getElementById('btnReset').addEventListener('click', resetGame);

            // 键盘
            document.addEventListener('keydown', (e) => {
                const step = 12;
                if (e.key === 'ArrowLeft') { e.preventDefault();
                    cursorX = Math.max(0, cursorX - step); }
                if (e.key === 'ArrowRight') { e.preventDefault();
                    cursorX = Math.min(W, cursorX + step); }
                if (e.key === 'ArrowUp') { e.preventDefault();
                    cursorY = Math.max(0, cursorY - step); }
                if (e.key === 'ArrowDown') { e.preventDefault();
                    cursorY = Math.min(H, cursorY + step); }
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (gameOver) { resetGame(); return; }
                    shoot(cursorX, cursorY);
                }
                if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                    resetGame(); }
            });

            function resetGame() {
                balloons = [];
                particles = [];
                floatingTexts = [];
                score = 0;
                combo = 0;
                maxCombo = 0;
                gameOver = false;
                spawnTimer = 0;
                spawnInterval = 40;
                cursorX = W / 2;
                cursorY = H - 60;
                updateUI();
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            resetGame();
            loop();
        })();
    </script>
</body>
</html>
