<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · 游戏库页面未找到</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 70%, #0f0f1a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 40%, rgba(124,92,252,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(252,92,124,0.06) 0%, transparent 50%);
            animation: glowMove 20s infinite alternate;
        }
        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .error-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }
        .error-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(124,92,252,0.05), transparent 60%);
            animation: introGlow 8s infinite alternate;
        }
        @keyframes introGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fc5c7c, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            line-height: 1.2;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        .error-message {
            font-size: 1.05rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.6);
            font-weight: 300;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .error-message .highlight {
            color: #7c5cfc;
            font-weight: 500;
        }
        .error-message .highlight2 {
            color: #fc5c7c;
            font-weight: 500;
        }

        .timer-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .timer-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #7c5cfc;
            min-width: 60px;
            background: rgba(124,92,252,0.1);
            border-radius: 12px;
            padding: 0 10px;
        }
        .timer-label {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #ccc;
            backdrop-filter: blur(4px);
            min-width: 140px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c5cfc, #fc5c7c);
            border: none;
            color: #fff;
            box-shadow: 0 8px 24px rgba(124,92,252,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(124,92,252,0.4);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(124,92,252,0.3);
            color: #fff;
        }
        .btn .badge {
            display: inline-block;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 1px 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .btn-primary .badge {
            background: rgba(255,255,255,0.2);
        }
        .btn .sub {
            display: block;
            font-size: 0.6rem;
            font-weight: 300;
            opacity: 0.6;
            margin-top: 2px;
        }

        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.12);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .detected-badge {
            display: inline-block;
            background: rgba(124,92,252,0.12);
            border: 1px solid rgba(124,92,252,0.2);
            border-radius: 60px;
            padding: 4px 18px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .detected-badge strong {
            color: #7c5cfc;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .error-card { padding: 30px 20px; }
            .error-code { font-size: 4rem; }
            .error-title { font-size: 1.4rem; }
            .timer-number { font-size: 2rem; min-width: 40px; }
            .btn { padding: 10px 16px; font-size: 0.85rem; min-width: 120px; }
            .btn .sub { font-size: 0.55rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="error-card">
        <div class="error-code">404</div>
        <div class="error-title">游戏库页面未找到</div>
        <div class="error-message">
            你访问的游戏页面可能已被移除或链接有误。<br>
            我们将自动带你返回游戏库首页。
        </div>

        <!-- 当前检测到的版本 -->
        <div class="detected-badge" id="detectedBadge">
            🔍 检测到你正在使用 <strong id="detectedVersion">...</strong>
        </div>

        <div class="timer-section">
            <span class="timer-label">倒计时</span>
            <span class="timer-number" id="countdown">10</span>
            <span class="timer-label">秒</span>
        </div>

        <div class="btn-group">
            <a href="#" class="btn btn-primary" id="goProxyBtn">
                🚀 加速版
                <span class="sub">game.lelegame.dpdns.org</span>
            </a>
            <a href="#" class="btn btn-secondary" id="goOriginalBtn">
                📦 原始版
                <span class="sub">sltlele.github.io/LeleGames</span>
            </a>
        </div>
    </div>
    <div class="footer">Lele游戏库 · 用代码编织快乐</div>
</div>

<script>
    (function() {
        // =============================================
        // 配置：两个版本的游戏库首页地址
        // =============================================
        var PROXY_HOME   = 'https://game.lelegame.dpdns.org/';
        var ORIGINAL_HOME = 'https://sltlele.github.io/LeleGames/';

        // =============================================
        // 自动检测当前访问的是哪个版本
        // =============================================
        var currentHost = window.location.hostname;

        // 判断当前是否为代理版（包含 lelegame.dpdns.org）
        var isProxy = currentHost.indexOf('lelegame.dpdns.org') !== -1;

        // 默认跳转目标：根据当前域名自动选择
        var defaultHome = isProxy ? PROXY_HOME : ORIGINAL_HOME;
        var defaultLabel = isProxy ? '加速版' : '原始版';

        // =============================================
        // DOM 元素
        // =============================================
        var countdownEl = document.getElementById('countdown');
        var goProxyBtn = document.getElementById('goProxyBtn');
        var goOriginalBtn = document.getElementById('goOriginalBtn');
        var detectedVersion = document.getElementById('detectedVersion');

        // 显示检测结果
        detectedVersion.textContent = defaultLabel;

        // 设置按钮的 href
        goProxyBtn.href = PROXY_HOME;
        goOriginalBtn.href = ORIGINAL_HOME;

        // =============================================
        // 倒计时逻辑
        // =============================================
        var seconds = 10;
        var timer = null;

        function updateDisplay() {
            countdownEl.textContent = seconds;
        }

        function goHome() {
            window.location.href = defaultHome;
        }

        function startCountdown() {
            timer = setInterval(function() {
                seconds -= 1;
                if (seconds <= 0) {
                    clearInterval(timer);
                    goHome();
                } else {
                    updateDisplay();
                }
            }, 1000);
        }

        // 点击按钮时停止倒计时并跳转（按钮本身已有 href，但需要阻止默认行为以便清除定时器）
        goProxyBtn.addEventListener('click', function(e) {
            // 不阻止默认，让 href 正常工作，但先清除定时器
            if (timer) {
                clearInterval(timer);
            }
            // 让浏览器正常跳转
        });

        goOriginalBtn.addEventListener('click', function(e) {
            if (timer) {
                clearInterval(timer);
            }
        });

        // 启动倒计时
        startCountdown();

        // =============================================
        // 键盘快捷键：1 跳转加速版，2 跳转原始版
        // =============================================
        document.addEventListener('keydown', function(e) {
            if (e.key === '1') {
                if (timer) clearInterval(timer);
                window.location.href = PROXY_HOME;
            } else if (e.key === '2') {
                if (timer) clearInterval(timer);
                window.location.href = ORIGINAL_HOME;
            }
        });

        console.log('🔍 当前域名: ' + currentHost);
        console.log('📍 检测到: ' + defaultLabel + '，倒计时结束后将自动跳转');
        console.log('⌨️  按 1 键 → 加速版 | 按 2 键 → 原始版');
    })();
</script>
</body>
</html>
